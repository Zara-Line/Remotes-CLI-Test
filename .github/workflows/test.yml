name: Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: external-remotes-access
    steps:
      - name: Test
        run: |
          # Prepare Tools
          sudo apt-get install -y glab tea-cli 7zip
          sudo 7z x ./tools/forgejo-cli-linux.7z -o/usr/bin
          sudo chmod +x /usr/bin/fj

          # Authorize Tools
          glab auth login --hostname "gitlab.com" --token "${{ secrets.GITLAB_COM_TOKEN }}"
          tea login add -u "gitea.com" -t "${{ secrets.GITEA_COM_TOKEN }}"
          fj -H codeberg.org auth add-key "${{ vars.MY_ID }}" "${{ secrets.GITEA_COM_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
