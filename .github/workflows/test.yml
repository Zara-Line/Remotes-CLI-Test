name: Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: external-remotes-access
    steps:
      # - name: Free Disk-Space
      #   run: df -h && sudo apt-get clean && docker system prune -a -f && sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android && df -h
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare
        run: |
          set -xe
          shopt -s nullglob

          # Prepare Tools
          sudo apt-get install -y glab 7zip
          sudo 7z x ./tools/tea-linux-amd64.7z -o/usr/bin
          sudo 7z x ./tools/forgejo-cli-linux.7z -o/usr/bin
          sudo chmod +x /usr/bin/fj /usr/bin/tea

          # Authorize Tools
          glab auth login --hostname "gitlab.com" --token "${{ secrets.GITLAB_COM_TOKEN }}"
          tea login add -u "gitea.com" -t "${{ secrets.GITEA_COM_TOKEN }}"
          tea login default "gitea.com"
          fj -H codeberg.org auth add-key "${{ vars.MY_ID }}" "${{ secrets.GITEA_COM_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Delete Old
        run: |
          set -xe
          shopt -s nullglob

          # Delete Latest
          glab release delete "test-latest" -y -t -R "${{ vars.REPOSITORY_NAME }}"
          tea r rm -y --delete-tag "test-latest" -r "${{ vars.REPOSITORY_NAME }}"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Create Latest
        run: |
          set -xe
          shopt -s nullglob

          # Vars
          RELDATE="$(date +'%Y-%m-%d %H:%M')"
          NAME="Test $RELDATE"

          # Save Tag and Release Name
          echo "release_name=$NAME" >> "$GITHUB_ENV"

          # Sync Release
          glab release create "test-latest" tools/* -r "master" -n "$release_name" -F "./README.md" -R "${{ vars.REPOSITORY_NAME }}"
          tea r c --tag "test-latest" -a tools/* --target "master" -t "$release_name" -f "./README.md" -r "${{ vars.REPOSITORY_NAME }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
